
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>番茄钟 - 25 分钟</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #ff9a9e 0%, #fad0c4 35%, #fbc2eb 70%, #a18cd1 100%);
      color: #222;
    }

    .overlay {
      position: fixed;
      inset: 0;
      backdrop-filter: blur(8px);
      background: rgba(255, 255, 255, 0.15);
      z-index: -1;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      padding: 32px 28px 26px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.18);
      max-width: 380px;
      width: 90%;
      text-align: center;
    }

    .title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #777;
      margin-bottom: 24px;
    }

    .timer-wrapper {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 0 auto 24px;
    }

    .timer-svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .timer-bg {
      fill: none;
      stroke: #eee;
      stroke-width: 10;
    }

    .timer-progress {
      fill: none;
      stroke: url(#grad);
      stroke-width: 10;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.5s linear;
    }

    .timer-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      pointer-events: none;
    }

    .time {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .status {
      margin-top: 4px;
      font-size: 0.85rem;
      color: #999;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 20px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background 0.2s ease;
    }

    .btn-main {
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      color: #fff;
      box-shadow: 0 10px 20px rgba(255, 117, 140, 0.4);
    }

    .btn-main.paused {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      box-shadow: 0 10px 20px rgba(79, 172, 254, 0.4);
    }

    .btn-secondary {
      background: #f1f1f5;
      color: #555;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
    }

    button:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: none;
    }

    .hint {
      font-size: 0.8rem;
      color: #999;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px 18px 20px;
        border-radius: 20px;
      }
      .timer-wrapper {
        width: 190px;
        height: 190px;
      }
      .time {
        font-size: 2.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>

  <div class="card">
    <div class="title">番茄钟</div>
    <div class="subtitle">专注 25 分钟 · 休息 5 分钟</div>

    <div class="timer-wrapper">
      <svg class="timer-svg" viewBox="0 0 120 120">
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ff9a9e" />
            <stop offset="50%" stop-color="#fad0c4" />
            <stop offset="100%" stop-color="#fbc2eb" />
          </linearGradient>
        </defs>
        <circle class="timer-bg" cx="60" cy="60" r="52" />
        <circle class="timer-progress" cx="60" cy="60" r="52" />
      </svg>
      <div class="timer-text">
        <div class="time" id="time-display">25:00</div>
        <div class="status" id="status-text">准备开始</div>
      </div>
    </div>

    <div class="controls">
      <button id="start-pause-btn" class="btn-main">开始</button>
      <button id="reset-btn" class="btn-secondary">重置</button>
    </div>
    <div class="hint">提示：开始前可点击页面任意位置启用声音权限</div>
  </div>

  <script>
    // 配置：25 分钟
    const POMODORO_MINUTES = 25;
    const TOTAL_SECONDS = POMODORO_MINUTES * 60;

    const timeDisplay = document.getElementById("time-display");
    const statusText = document.getElementById("status-text");
    const startPauseBtn = document.getElementById("start-pause-btn");
    const resetBtn = document.getElementById("reset-btn");
    const progressCircle = document.querySelector(".timer-progress");

    // 圆圈进度设置
    const RADIUS = 52;
    const CIRCUMFERENCE = 2 * Math.PI * RADIUS;
    progressCircle.style.strokeDasharray = CIRCUMFERENCE;
    progressCircle.style.strokeDashoffset = 0;

    let remainingSeconds = TOTAL_SECONDS;
    let timerId = null;
    let isRunning = false;

    // Web Audio 用于播放铃声
    let audioContext = null;

    function initAudioContextOnce() {
      if (!audioContext) {
        try {
          audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.warn("不支持 Web Audio，铃声不可用。");
        }
      }
    }

    // 一个简单的“滴滴滴”铃声
    function playBeepPattern() {
      if (!audioContext) return;
      const now = audioContext.currentTime;

      const pattern = [
        { start: 0, duration: 0.18, freq: 880 },
        { start: 0.25, duration: 0.18, freq: 880 },
        { start: 0.5, duration: 0.25, freq: 660 }
      ];

      pattern.forEach(note => {
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.type = "sine";
        osc.frequency.value = note.freq;
        osc.connect(gain);
        gain.connect(audioContext.destination);

        const t0 = now + note.start;
        const t1 = t0 + note.duration;

        gain.gain.setValueAtTime(0, t0);
        gain.gain.linearRampToValueAtTime(0.6, t0 + 0.03);
        gain.gain.linearRampToValueAtTime(0.0, t1);

        osc.start(t0);
        osc.stop(t1 + 0.02);
      });
    }

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m.toString().padStart(2, "0")}:${s.toString().padStart(2, "0")}`;
    }

    function updateDisplay() {
      timeDisplay.textContent = formatTime(remainingSeconds);
      const progress = 1 - remainingSeconds / TOTAL_SECONDS;
      progressCircle.style.strokeDashoffset = progress * CIRCUMFERENCE;
    }

    function setStatus(text) {
      statusText.textContent = text;
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      startPauseBtn.textContent = "暂停";
      startPauseBtn.classList.add("paused");
      setStatus("专注中…");

      timerId = setInterval(() => {
        if (remainingSeconds > 0) {
          remainingSeconds--;
          updateDisplay();
        } else {
          clearInterval(timerId);
          timerId = null;
          isRunning = false;
          startPauseBtn.textContent = "重新开始";
          startPauseBtn.classList.remove("paused");
          setStatus("完成！可以短暂休息一下");
          playBeepPattern();
        }
      }, 1000);
    }

    function pauseTimer() {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(timerId);
      timerId = null;
      startPauseBtn.textContent = "继续";
      startPauseBtn.classList.remove("paused");
      setStatus("已暂停");
    }

    function resetTimer() {
      clearInterval(timerId);
      timerId = null;
      isRunning = false;
      remainingSeconds = TOTAL_SECONDS;
      updateDisplay();
      setStatus("准备开始");
      startPauseBtn.textContent = "开始";
      startPauseBtn.classList.remove("paused");
    }

    startPauseBtn.addEventListener("click", () => {
      initAudioContextOnce();
      if (!isRunning && remainingSeconds === 0) {
        // 从 0 重新开始一轮
        remainingSeconds = TOTAL_SECONDS;
        updateDisplay();
      }
      if (isRunning) {
        pauseTimer();
      } else {
        startTimer();
      }
    });

    resetBtn.addEventListener("click", () => {
      resetTimer();
    });

    // 首次渲染
    updateDisplay();

    // 任意点击启用声音权限
    document.addEventListener("click", function enableAudioOnce() {
      initAudioContextOnce();
      if (audioContext && audioContext.state === "suspended") {
        audioContext.resume();
      }
      document.removeEventListener("click", enableAudioOnce);
    }, { once: true });
  </script>
</body>
</html>
